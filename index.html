<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Strudel → Score</title>
<script src="https://www.verovio.org/javascript/latest/verovio-toolkit-wasm.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --surface: #f5f5f5;
    --border: #d0d0d0;
    --accent: #1a1a1a;
    --accent2: #555555;
    --text: #1a1a1a;
    --muted: #888;
    --font-mono: 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 32px;
    gap: 24px;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
  }

  h1 {
    font-size: 13px;
    font-weight: normal;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .subtitle {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .input-row {
    display: flex;
    gap: 12px;
    align-items: stretch;
  }

  .pattern-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 15px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.15s;
    letter-spacing: 0.04em;
  }

  .pattern-input:focus {
    border-color: var(--accent);
  }

  .convert-btn {
    background: var(--accent);
    color: #ffffff;
    border: none;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0 24px;
    cursor: pointer;
    transition: background 0.15s, transform 0.05s;
  }

  .convert-btn:hover { background: #333; }
  .convert-btn:active { transform: scale(0.97); }
  .convert-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

  .presets {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .presets-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-right: 4px;
  }

  .preset-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.1s;
  }

  .preset-btn:hover {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  .live-panel {
    border: 1px solid var(--border);
    padding: 16px;
  }

  .live-panel-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .live-panel-title {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .live-panel-hint {
    font-size: 10px;
    color: var(--muted);
  }

  .live-lines {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .live-line-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .live-line-checkbox {
    width: 14px;
    height: 14px;
    cursor: pointer;
    accent-color: var(--accent);
    flex-shrink: 0;
  }

  .live-line-label {
    width: 28px;
    font-size: 12px;
    color: var(--accent2);
    cursor: pointer;
    flex-shrink: 0;
  }

  .live-line-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
  }

  .live-line-input:focus { border-color: var(--accent); }

  .options-row {
    display: flex;
    gap: 24px;
    align-items: center;
    flex-wrap: wrap;
  }

  .option {
    display: flex;
    gap: 8px;
    align-items: center;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .option label { cursor: pointer; text-transform: uppercase; }

  select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 4px 8px;
    outline: none;
    cursor: pointer;
  }

  select:focus { border-color: var(--accent); }

  .score-area {
    background: var(--surface);
    border: 1px solid var(--border);
    min-height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    position: relative;
    overflow-x: auto;
  }

  .score-area svg {
    max-width: 100%;
    height: auto;
  }

  /* Verovio SVG theming */
  .score-area svg g[id^="page"] { fill: var(--text); }
  .score-area .verovio-score { filter: invert(1) hue-rotate(180deg); }

  .placeholder {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.15em;
    line-height: 2;
    text-transform: uppercase;
  }

  .placeholder .big { font-size: 28px; display: block; margin-bottom: 12px; opacity: 0.3; }

  .status {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 8px 0;
    min-height: 28px;
  }

  .status.ok { color: #2a7a2a; }
  .status.err { color: #c00; }
  .status.info { color: #555; }

  .events-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 6px;
    max-height: 160px;
    overflow-y: auto;
  }

  .event-chip {
    background: var(--bg);
    border: 1px solid var(--border);
    font-size: 10px;
    padding: 5px 8px;
    line-height: 1.6;
    letter-spacing: 0.05em;
  }

  .event-chip .pitch { color: var(--accent); }
  .event-chip .dur { color: var(--accent2); }

  details {
    border: 1px solid var(--border);
  }

  summary {
    padding: 10px 14px;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }

  summary:hover { color: var(--text); }

  .details-body {
    padding: 14px;
    border-top: 1px solid var(--border);
  }

  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer {
    margin-top: auto;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    border-top: 1px solid var(--border);
    padding-top: 14px;
  }
</style>
</head>
<body>

<header>
  <h1>Strudel → Score</h1>
  <span class="subtitle">mini-notation · verovio · MEI</span>
</header>

<div class="input-row">
  <input class="pattern-input" id="patInput" type="text"
    value="[c4*5 c3!4]" placeholder="Enter Strudel mini-notation…" />
  <button class="convert-btn" id="convertBtn">Convert</button>
</div>

<div class="presets">
  <span class="presets-label">Presets</span>
  <button class="preset-btn" data-p="[c4*5 c3!4]" data-mode="pitch">mini notation wonders!</button>
  <button class="preset-btn" data-p="c4 [e4 g4] a4 b4" data-mode="pitch">basic chord tones</button>
  <button class="preset-btn" data-p="c4 d4 e4 f4 g4 a4 b4 c5" data-mode="pitch">scale</button>
  <button class="preset-btn" data-p="[c4 e4 g4] [f4 a4 c5] [g4 b4 d5] c5" data-mode="pitch">I–IV–V–I</button>
  <button class="preset-btn" data-p="c4@3 r e4 [g4 f4] e4@2" data-mode="pitch">elongation @</button>
  <button class="preset-btn" data-p="c4*3 e4 g4" data-mode="pitch">speed *</button>
  <button class="preset-btn" data-p="c4!3 e4" data-mode="pitch">replicate !</button>
  <button class="preset-btn" data-p="c4 ~ e4 ~ g4 ~ b4 ~" data-mode="pitch">held notes</button>
  <button class="preset-btn" data-p="[c4 d4 e4 f4] [g4 a4 b4 c5]" data-mode="pitch">subdivisions</button>
  <button class="preset-btn" data-p="bd sn hh hh" data-mode="rhythm">rhythm: basic beat</button>
  <button class="preset-btn" data-p="bd sn [hh hh hh] sn" data-mode="rhythm">rhythm: triplet hat</button>
  <button class="preset-btn" data-p="bd ! sn ~" data-mode="rhythm">bare ! repeat</button>
  <button class="preset-btn" data-p="<bd sn hh>" data-mode="rhythm" data-cycles="4">&lt;&gt; cycle alternation</button>
  <button class="preset-btn" data-p="c4*4, e5*8" data-mode="pitch">, parallel layers</button>
</div>

<div class="live-panel">
  <div class="live-panel-header">
    <span class="live-panel-title">Live Lines</span>
    <span class="live-panel-hint">flag a line to send it to the score — updates as you type</span>
  </div>
  <div class="live-lines" id="liveLines">
    <div class="live-line-row">
      <input type="checkbox" class="live-line-checkbox" id="flag-d1">
      <label class="live-line-label" for="flag-d1">d1</label>
      <input type="text" class="live-line-input" value="bd sn hh hh" placeholder="Enter mini-notation…">
    </div>
    <div class="live-line-row">
      <input type="checkbox" class="live-line-checkbox" id="flag-d2">
      <label class="live-line-label" for="flag-d2">d2</label>
      <input type="text" class="live-line-input" value="c4 e4 g4" placeholder="Enter mini-notation…">
    </div>
    <div class="live-line-row">
      <input type="checkbox" class="live-line-checkbox" id="flag-d3">
      <label class="live-line-label" for="flag-d3">d3</label>
      <input type="text" class="live-line-input" placeholder="Enter mini-notation…">
    </div>
    <div class="live-line-row">
      <input type="checkbox" class="live-line-checkbox" id="flag-d4">
      <label class="live-line-label" for="flag-d4">d4</label>
      <input type="text" class="live-line-input" placeholder="Enter mini-notation…">
    </div>
  </div>
</div>

<div class="options-row">
  <div class="option">
    <label for="cyclesOpt">Cycles</label>
    <select id="cyclesOpt">
      <option value="1">1</option>
      <option value="2" selected>2</option>
      <option value="4">4</option>
    </select>
  </div>
  <div class="option">
    <label for="modeOpt">Mode</label>
    <select id="modeOpt">
      <option value="pitch" selected>Pitch</option>
      <option value="rhythm">Rhythm</option>
    </select>
  </div>
  <div class="option">
    <label for="clefOpt">Clef</label>
    <select id="clefOpt">
      <option value="treble" selected>Treble</option>
      <option value="bass">Bass</option>
    </select>
  </div>
</div>

<div class="status info" id="status">Initialising Verovio…</div>

<div class="score-area" id="scoreArea">
  <div class="placeholder">
    <span class="big">𝄞</span>
    Enter a pattern above and press Convert
  </div>
</div>

<details id="eventDetails" style="display:none">
  <summary>Parsed events</summary>
  <div class="details-body">
    <div class="events-grid" id="eventsGrid"></div>
  </div>
</details>

<details id="meiDetails" style="display:none">
  <summary>MEI source</summary>
  <div class="details-body">
    <pre id="meiPre" style="font-size:10px;color:var(--muted);white-space:pre-wrap;overflow:auto;max-height:200px"></pre>
  </div>
</details>

<footer>
  Strudel mini-notation parser · Verovio WASM 4.2 · No server required
</footer>

<script>
// ─── 1. Strudel mini-notation parser ─────────────────────────────────────────
// Handles: sequences, sub-cycles [], elongation @N, speed *N, replicate !N, rests r/~

class Fraction {
  constructor(n, d = 1) { this.n = n; this.d = d; this.reduce(); }
  reduce() {
    const g = gcd(Math.abs(this.n), this.d);
    this.n /= g; this.d /= g;
    return this;
  }
  add(f) { return new Fraction(this.n * f.d + f.n * this.d, this.d * f.d); }
  mul(f) { return new Fraction(this.n * f.n, this.d * f.d); }
  toFloat() { return this.n / this.d; }
  toString() { return `${this.n}/${this.d}`; }
}

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

// Tuplet helpers: a group of N equal-weight children is "clean" binary
// notation only when N is a power of two (1, 2, 4, 8...). Any other N
// needs a tuplet bracket against the nearest lower power of two.
function isPow2(n) { return n > 0 && (n & (n - 1)) === 0; }
function lowerPow2(n) { let p = 1; while (p * 2 <= n) p *= 2; return p; }

// <a b c> picks one alternative per cycle (cycle 0 -> a, 1 -> b, 2 -> c,
// 3 -> a again...). Resolve repeatedly in case an alternative is itself
// an alt (not produced by the current parser, but safe either way).
function resolveAlt(el, cycleIndex) {
  while (el.type === 'alt') {
    const len = el.alternatives.length;
    const idx = ((cycleIndex % len) + len) % len;
    el = el.alternatives[idx];
  }
  return el;
}

// Tokenise: splits on spaces, brackets, angle brackets and commas;
// * ! @ may be attached to a token or stand alone after a bracket/group.
function tokenise(src) {
  return src.trim()
    .replace(/\[/g, ' [ ')
    .replace(/\]/g, ' ] ')
    .replace(/</g, ' < ')
    .replace(/>/g, ' > ')
    .replace(/,/g, ' , ')
    .split(/\s+/)
    .filter(Boolean);
}

// Parse modifier suffix from a raw token: c4*3, c4!2, c4@3, [..]@2 etc.
// Returns { base, op, n } where op is '*', '!', '@', or null
function parseMod(tok) {
  const m = tok.match(/^(.*?)([*!@])(\d+(?:\.\d+)?)$/);
  if (!m) return { base: tok, op: null, n: 1 };
  return { base: m[1], op: m[2], n: parseFloat(m[3]) };
}

// Parses a sequence up to `closeTok` (or end of input at the top level).
// Returns `{ layers, pos }`: normally `layers` has one entry (the
// sequence itself), but a "," found at this nesting level splits the
// whole scope into N parallel layers (e.g. "bd*4, hh*8" — two voices
// playing simultaneously for the full pattern), one per comma-separated
// part.
function parseTokens(tokens, pos, closeTok = null) {
  const layers = [[]];
  const current = () => layers[layers.length - 1];

  while (pos < tokens.length) {
    const tok = tokens[pos];
    if (tok === closeTok) { pos++; break; }

    if (tok === ',') {
      pos++;
      layers.push([]);
      continue;
    }

    if (tok === '[') {
      pos++;
      const sub = parseTokens(tokens, pos, ']');
      pos = sub.pos;
      let op = null, n = 1;
      if (pos < tokens.length) {
        const m = tokens[pos].match(/^([*!@])(\d+(?:\.\d+)?)$/);
        if (m) { op = m[1]; n = parseFloat(m[2]); pos++; }
      }
      // Parallel layers (",") are only rendered as true simultaneous
      // voices at a pattern's top level (see patternsToMEI). Nested
      // inside a bracket, they're flattened back into one sequence so
      // no events are silently dropped — a known scope limit, not a bug.
      const subElements = sub.layers.length > 1 ? [].concat(...sub.layers) : sub.layers[0];
      const weight = op === '@' ? n : 1;
      const repeat = op === '!' ? n : 1;
      const speed  = op === '*' ? n : 1;
      if (op === '!' || op === null) {
        for (let i = 0; i < Math.round(repeat); i++)
          current().push({ type: 'group', children: subElements, weight });
      } else if (op === '*') {
        const repeated = [];
        for (let i = 0; i < Math.round(speed); i++)
          repeated.push(...subElements);
        current().push({ type: 'group', children: repeated, weight: 1 });
      } else {
        current().push({ type: 'group', children: subElements, weight });
      }
      continue;
    }

    if (tok === '<') {
      pos++;
      const sub = parseTokens(tokens, pos, '>');
      pos = sub.pos;
      let op = null, n = 1;
      if (pos < tokens.length) {
        const m = tokens[pos].match(/^([*!@])(\d+(?:\.\d+)?)$/);
        if (m) { op = m[1]; n = parseFloat(m[2]); pos++; }
      }
      const weight = op === '@' ? n : 1;
      current().push({ type: 'alt', alternatives: sub.layers[0], weight });
      continue;
    }

    if (tok === '!') {
      // Bare "!" repeats the previous element in this sequence:
      // "bd ! sn" == "bd bd sn". No-op if nothing precedes it.
      pos++;
      const cur = current();
      if (cur.length) cur.push(cur[cur.length - 1]);
      continue;
    }

    const { base, op, n } = parseMod(tok);
    pos++;
    if (op === '@') {
      current().push({ type: 'leaf', value: base, weight: n });
    } else if (op === '!') {
      // replicate: insert n copies, each with weight 1
      for (let i = 0; i < Math.round(n); i++)
        current().push({ type: 'leaf', value: base, weight: 1 });
    } else if (op === '*') {
      // speed up: n equal copies packed into one slot (weight 1 total)
      // model as a group of n children
      const children = [];
      for (let i = 0; i < Math.round(n); i++)
        children.push({ type: 'leaf', value: base, weight: 1 });
      current().push({ type: 'group', children, weight: 1 });
    } else {
      current().push({ type: 'leaf', value: base, weight: 1 });
    }
  }
  return { layers, pos };
}

// Flattening for the debug "parsed events" panel only — pure (start,end)
// timing per leaf, no notation concerns. MEI generation (below) walks the
// same tree separately so nested tuplets can nest correctly.
function elementsToEvents(elements, offset, length, cycleIndex = 0) {
  const totalWeight = elements.reduce((s, e) => s + e.weight, 0);
  let cursor = offset;
  const events = [];
  for (const el of elements) {
    const elLen = length.mul(new Fraction(el.weight, totalWeight));
    const resolved = resolveAlt(el, cycleIndex);
    if (resolved.type === 'leaf') {
      events.push({ value: resolved.value, begin: cursor, end: cursor.add(elLen) });
    } else {
      events.push(...elementsToEvents(resolved.children, cursor, elLen, cycleIndex));
    }
    cursor = cursor.add(elLen);
  }
  return events;
}

function evalPattern(src, numCycles = 1) {
  const tokens = tokenise(src);
  const { layers } = parseTokens(tokens, 0);
  const allEvents = [];
  for (let c = 0; c < numCycles; c++) {
    const cycleOffset = new Fraction(c);
    for (const layer of layers) {
      const raw = elementsToEvents(layer, new Fraction(0), new Fraction(1), c);
      for (const e of raw) {
        allEvents.push({
          value: e.value,
          begin: e.begin.add(cycleOffset),
          end: e.end.add(cycleOffset)
        });
      }
    }
  }
  return allEvents;
}

// ─── 2. Event → MEI duration mapping ─────────────────────────────────────────
// Given a duration as a Fraction (in cycles), map to closest MEI dur + dots

// MEI duration codes are numeric (1=whole, 2=half, 4=quarter, 8, 16, 32),
// not word forms — Verovio tolerates word forms like "whole"/"quarter" on
// <note> (silently falling back) but divides by zero laying out a <rest>
// with one, so this must stay numeric for both to render safely.
const DUR_TABLE = [
  // [fraction, dur, dots]
  [new Fraction(1, 1),   '1',  0],
  [new Fraction(3, 4),   '2',  1],
  [new Fraction(1, 2),   '2',  0],
  [new Fraction(3, 8),   '4',  1],
  [new Fraction(1, 4),   '4',  0],
  [new Fraction(3, 16),  '8',  1],
  [new Fraction(1, 8),   '8',  0],
  [new Fraction(3, 32),  '16', 1],
  [new Fraction(1, 16),  '16', 0],
  [new Fraction(1, 32),  '32', 0],
];

// Map a duration fraction (relative to a 4/4 measure = 1 whole note) to MEI
function durationToMEI(frac, beatsPerCycle = 4) {
  // In 4/4, 1 cycle = 4 beats, 1 whole = 1 cycle
  const normalized = frac; // already relative to one cycle = one whole note
  let best = DUR_TABLE[0];
  let bestDiff = Infinity;
  for (const entry of DUR_TABLE) {
    const diff = Math.abs(entry[0].toFloat() - normalized.toFloat());
    if (diff < bestDiff) { bestDiff = diff; best = entry; }
  }
  return { dur: best[1], dots: best[2] };
}

// Parse a Strudel note name → MEI pname + oct
// Strudel: c4, d#5, eb3, r (rest), ~ (hold/tie)
function parseNote(val) {
  if (val === 'r' || val === '~') return { rest: true, tie: val === '~' };
  // Match e.g. "c#4", "eb5", "a4", "C4"
  const m = val.toLowerCase().match(/^([a-g])([#b]?)(\d+)$/);
  if (!m) return null;
  const pname = m[1];
  const acc = m[2] === '#' ? 's' : m[2] === 'b' ? 'f' : '';
  const oct = parseInt(m[3]);
  return { pname, acc, oct, rest: false };
}

// In rhythm-only mode, every non-rest token (sample names like "bd", "sn"
// carry no pitch) gets drawn on a single fixed pitch — the staff's own
// middle line — so the notation reads purely as rhythm.
function clefMiddlePitch(clef) {
  return clef === 'treble' ? { pname: 'b', oct: 4 } : { pname: 'd', oct: 3 };
}

// ─── 3. Pattern tree → MEI XML ───────────────────────────────────────────────
// No time signature: each cycle is its own free measure, sized by whatever
// it actually contains.
//
// Tuplets are detected and emitted by walking the parse tree directly
// (not a flattened event list), because tuplets can nest: a group's own
// non-binary equal subdivision becomes a <tuplet>, and the *written*
// duration of every leaf inside it is its real duration scaled by the
// product of every enclosing tuplet's num/numbase — that's what turns an
// otherwise unnotatable fraction (like 1/9 of a cycle) into something
// readable ("triplet eighth nested inside a triplet beat").

let noteIdSeq = 1;

// `mode` is 'pitch' or 'rhythm'. In pitch mode a token that isn't a
// recognized note name (e.g. a sample name like "bd") yields no event —
// the caller tracks this via `stats` to offer a "switch to Rhythm mode"
// fallback. In rhythm mode every non-rest token renders at `fixedPitch`.
function noteOrRestXML(value, writtenDur, mode, fixedPitch, stats) {
  stats.total++;
  let noteInfo;
  if (mode === 'rhythm') {
    const isRest = value === 'r' || value === '~';
    noteInfo = isRest ? { rest: true } : { rest: false, pname: fixedPitch.pname, oct: fixedPitch.oct, acc: '' };
  } else {
    noteInfo = parseNote(value);
    if (!noteInfo) return null;
  }

  const id = `n${noteIdSeq++}`;
  const { dur, dots } = durationToMEI(writtenDur);
  stats.rendered++;

  if (noteInfo.rest) {
    return `<rest xml:id="${id}" dur="${dur}"${dots ? ` dots="${dots}"` : ''}/>`;
  }
  const accAttr = noteInfo.acc ? ` accid="${noteInfo.acc}"` : '';
  return `<note xml:id="${id}" pname="${noteInfo.pname}" oct="${noteInfo.oct}" dur="${dur}"${dots ? ` dots="${dots}"` : ''}${accAttr}/>`;
}

// Recursively turn a list of sibling elements (all occupying `length` of
// the parent slot) into MEI item strings. `scale` is the cumulative
// num/numbase product of every tuplet enclosing this call, applied to
// leaf durations so nested tuplets compound correctly. `cycleIndex`
// picks the right branch of any <a b c> alternation encountered.
function buildMEIItems(elements, length, scale, mode, fixedPitch, stats, cycleIndex) {
  const totalWeight = elements.reduce((s, e) => s + e.weight, 0);
  const n = elements.length;
  const allEqualWeight = n > 0 && elements.every(e => e.weight === elements[0].weight);
  const isTuplet = n > 1 && allEqualWeight && !isPow2(n);
  const numbase = isTuplet ? lowerPow2(n) : n;
  const childScale = isTuplet ? scale.mul(new Fraction(n, numbase)) : scale;

  const items = [];
  for (const el of elements) {
    const elLen = length.mul(new Fraction(el.weight, totalWeight));
    const resolved = resolveAlt(el, cycleIndex);
    if (resolved.type === 'leaf') {
      const xml = noteOrRestXML(resolved.value, elLen.mul(childScale), mode, fixedPitch, stats);
      if (xml) items.push(xml);
    } else {
      items.push(...buildMEIItems(resolved.children, elLen, childScale, mode, fixedPitch, stats, cycleIndex));
    }
  }

  if (isTuplet && items.length) {
    return [`<tuplet num="${n}" numbase="${numbase}">\n${items.join('\n')}\n</tuplet>`];
  }
  return items;
}

// Multiple simultaneous patterns (e.g. flagged live-coder lines d1, d2...)
// become one staff each, stacked in the same staffGrp/measures — they're
// orbits playing together, so they belong in one score, not separate ones.
// Within a single pattern, a top-level "," (e.g. "bd*4, hh*8") becomes
// multiple simultaneous <layer> elements inside that one staff — true
// independent-rhythm polyphony, not chords, which is correct since the
// comma-separated parts usually don't share a common pulse.
function patternsToMEI(patterns, numCycles, { clef = 'treble', mode = 'pitch' } = {}) {
  noteIdSeq = 1;
  const parsed = patterns.map(p => {
    const tokens = tokenise(p.src);
    const { layers } = parseTokens(tokens, 0);
    return { label: p.label, layers };
  });

  const clefShape = clef === 'treble' ? 'G' : 'F';
  const clefLine  = clef === 'treble' ? '2' : '4';
  const fixedPitch = clefMiddlePitch(clef);
  const stats = { total: 0, rendered: 0 };

  const measureEls = [];
  for (let c = 0; c < numCycles; c++) {
    const staffEls = parsed.map((p, idx) => {
      const layerEls = p.layers.map((layerElements, li) => {
        const items = buildMEIItems(layerElements, new Fraction(1), new Fraction(1), mode, fixedPitch, stats, c);
        return `
          <layer n="${li + 1}">
            ${items.join('\n            ')}
          </layer>`;
      });
      return `
        <staff n="${idx + 1}">${layerEls.join('')}
        </staff>`;
    });
    measureEls.push(`
      <measure n="${c + 1}" right="${c === numCycles - 1 ? 'end' : 'single'}">${staffEls.join('')}
      </measure>`);
  }

  const staffDefs = parsed.map((p, idx) =>
    `<staffDef n="${idx + 1}" lines="5" clef.shape="${clefShape}" clef.line="${clefLine}">${p.label ? `<label>${p.label}</label>` : ''}</staffDef>`
  ).join('\n              ');

  const mei = `<?xml version="1.0" encoding="UTF-8"?>
<mei xmlns="http://www.music-encoding.org/ns/mei" meiversion="4.0">
  <meiHead><fileDesc><titleStmt><title/></titleStmt><pubStmt/></fileDesc></meiHead>
  <music>
    <body>
      <mdiv>
        <score>
          <scoreDef key.sig="0">
            <staffGrp>
              ${staffDefs}
            </staffGrp>
          </scoreDef>
          <section>
          ${measureEls.join('')}
          </section>
        </score>
      </mdiv>
    </body>
  </music>
</mei>`;

  return { mei, stats };
}

function patternToMEI(src, numCycles, opts = {}) {
  return patternsToMEI([{ label: null, src }], numCycles, opts);
}

// ─── 4. UI & Verovio rendering ───────────────────────────────────────────────
let vrvToolkit = null;

async function initVerovio() {
  const statusEl = document.getElementById('status');
  try {
    await new Promise(resolve => { Module.onRuntimeInitialized = resolve; });
    vrvToolkit = new verovio.toolkit();
    statusEl.textContent = 'Verovio ready — enter a pattern and press Convert';
    statusEl.className = 'status ok';
    document.getElementById('convertBtn').disabled = false;
  } catch (e) {
    statusEl.textContent = 'Verovio failed to load: ' + e.message;
    statusEl.className = 'status err';
    console.error(e);
  }
}

// Shared by the scratch playground and the live-lines renderer below.
function renderToScoreArea(mei) {
  const svg = vrvToolkit.renderData(mei, {
    pageWidth: 2400,
    pageHeight: 800,
    pageMarginTop: 80,
    pageMarginBottom: 80,
    pageMarginLeft: 80,
    pageMarginRight: 80,
    scale: 40,
    adjustPageWidth: 1,
    adjustPageHeight: 1,
  });
  const scoreArea = document.getElementById('scoreArea');
  scoreArea.innerHTML = svg;
  const svgEl = scoreArea.querySelector('svg');
  if (svgEl) {
    svgEl.style.filter = '';
    svgEl.style.maxWidth = '100%';
    svgEl.style.height = 'auto';
  }
}

function renderPattern() {
  const patInput = document.getElementById('patInput').value.trim();
  const cycles   = parseInt(document.getElementById('cyclesOpt').value);
  const clef     = document.getElementById('clefOpt').value;
  const mode     = document.getElementById('modeOpt').value;
  const statusEl = document.getElementById('status');

  if (!vrvToolkit) {
    statusEl.textContent = 'Verovio not yet loaded…'; statusEl.className = 'status info'; return;
  }
  if (!patInput) {
    statusEl.textContent = 'Please enter a pattern'; statusEl.className = 'status err'; return;
  }

  try {
    // Parse
    const events = evalPattern(patInput, cycles);

    // Render events grid
    const grid = document.getElementById('eventsGrid');
    grid.innerHTML = '';
    events.forEach(ev => {
      const chip = document.createElement('div');
      chip.className = 'event-chip';
      const dur = new Fraction(ev.end.n * ev.begin.d - ev.begin.n * ev.end.d,
                               ev.begin.d * ev.end.d);
      chip.innerHTML = `<span class="pitch">${ev.value}</span><br>` +
        `<span class="dur">${ev.begin.toString()} → ${ev.end.toString()}</span>`;
      grid.appendChild(chip);
    });
    document.getElementById('eventDetails').style.display = '';
    document.getElementById('meiDetails').style.display = '';

    // Convert to MEI and render
    const { mei, stats } = patternToMEI(patInput, cycles, { clef, mode });
    document.getElementById('meiPre').textContent = mei;
    renderToScoreArea(mei);

    if (stats.rendered === 0) {
      statusEl.textContent = 'No pitch data found in this pattern — try Rhythm mode';
      statusEl.className = 'status err';
    } else if (stats.rendered < stats.total) {
      statusEl.textContent = `✓ ${stats.rendered}/${stats.total} events rendered · ${stats.total - stats.rendered} skipped (no pitch data)`;
      statusEl.className = 'status ok';
    } else {
      statusEl.textContent = `✓ ${events.length} events · ${stats.rendered} notes rendered`;
      statusEl.className = 'status ok';
    }

  } catch (e) {
    statusEl.textContent = 'Error: ' + e.message;
    statusEl.className = 'status err';
    console.error(e);
  }
}

// ─── Live lines: flagged rows feed the score in real time ───────────────────
function getFlaggedLines() {
  return [...document.querySelectorAll('.live-line-row')]
    .filter(row => row.querySelector('.live-line-checkbox').checked)
    .map(row => ({
      label: row.querySelector('.live-line-label').textContent.trim(),
      src: row.querySelector('.live-line-input').value.trim()
    }))
    .filter(p => p.src.length > 0);
}

function renderLivePattern() {
  if (!vrvToolkit) return;

  const cycles   = parseInt(document.getElementById('cyclesOpt').value);
  const clef     = document.getElementById('clefOpt').value;
  const mode     = document.getElementById('modeOpt').value;
  const statusEl = document.getElementById('status');
  const patterns = getFlaggedLines();

  if (patterns.length === 0) {
    statusEl.textContent = 'No lines flagged — check a line below to send it to the score';
    statusEl.className = 'status info';
    document.getElementById('scoreArea').innerHTML =
      '<div class="placeholder"><span class="big">𝄞</span>Flag a line to send it to the score</div>';
    document.getElementById('eventDetails').style.display = 'none';
    document.getElementById('meiDetails').style.display = 'none';
    return;
  }

  try {
    const { mei, stats } = patternsToMEI(patterns, cycles, { clef, mode });
    document.getElementById('meiPre').textContent = mei;
    document.getElementById('meiDetails').style.display = '';
    document.getElementById('eventDetails').style.display = 'none';
    renderToScoreArea(mei);

    const labels = patterns.map(p => p.label).join(', ');
    if (stats.rendered === 0) {
      statusEl.textContent = `No pitch data found in flagged lines (${labels}) — try Rhythm mode`;
      statusEl.className = 'status err';
    } else if (stats.rendered < stats.total) {
      statusEl.textContent = `✓ live: ${labels} · ${stats.rendered}/${stats.total} events (${stats.total - stats.rendered} skipped)`;
      statusEl.className = 'status ok';
    } else {
      statusEl.textContent = `✓ live: ${labels} · ${stats.rendered} events rendered`;
      statusEl.className = 'status ok';
    }
  } catch (e) {
    statusEl.textContent = 'Error: ' + e.message;
    statusEl.className = 'status err';
    console.error(e);
  }
}

let liveDebounceTimer = null;
function scheduleLiveRender() {
  clearTimeout(liveDebounceTimer);
  liveDebounceTimer = setTimeout(renderLivePattern, 500);
}

document.querySelectorAll('.live-line-row').forEach(row => {
  row.querySelector('.live-line-input').addEventListener('input', scheduleLiveRender);
  row.querySelector('.live-line-checkbox').addEventListener('change', scheduleLiveRender);
});

// Wire up UI
document.getElementById('convertBtn').disabled = true;
document.getElementById('convertBtn').addEventListener('click', renderPattern);
document.getElementById('patInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') renderPattern();
});

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('patInput').value = btn.dataset.p;
    if (btn.dataset.mode) document.getElementById('modeOpt').value = btn.dataset.mode;
    if (btn.dataset.cycles) document.getElementById('cyclesOpt').value = btn.dataset.cycles;
    renderPattern();
  });
});

// Boot
initVerovio();
</script>
</body>
</html>
