<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>City Score · Performer 2</title>
<link rel="stylesheet" href="leaflet.css">
<style>
  :root {
    --bg: #0b0d11;
    --ink: #e8e6e0;
    --muted: #6a7480;
    --panel: rgba(18, 22, 28, 0.88);
    --line: #2a3038;
    --ok: #3fae82;
    --warn: #c8a000;
    --bad: #e05c5c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
  }

  #map { position: absolute; inset: 0; z-index: 1; background: #14181d; }
  #stage { position: absolute; inset: 0; z-index: 2; display: none; }

  .topbar {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 8px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 8px 12px;
    z-index: 1000;
    backdrop-filter: blur(8px);
  }
  .topbar input[type=text] {
    background: transparent; border: none; outline: none;
    color: var(--ink); font: inherit; font-size: 14px; width: 260px;
    padding: 2px 6px;
  }
  .pin-picker {
    display: flex; align-items: center; gap: 6px;
    border-left: 1px solid var(--line);
    padding-left: 10px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
  }
  .pin-picker select {
    appearance: none;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--ink);
    font: inherit;
    font-size: 12px;
    font-weight: 800;
    padding: 6px 24px 6px 10px;
    cursor: pointer;
  }
  .btn {
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink);
    border-radius: 999px;
    font: inherit; font-size: 13px; font-weight: 700;
    padding: 7px 16px;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn.primary { background: #146c94; border-color: #146c94; color: #fff; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .hud {
    position: fixed; top: 14px; left: 14px;
    display: flex; align-items: center; gap: 10px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 12px;
    z-index: 1000;
    backdrop-filter: blur(8px);
  }
  .dot { width: 9px; height: 9px; border-radius: 999px; background: var(--line); transition: background 0.3s; }
  .dot.connecting { background: var(--warn); }
  .dot.connected  { background: var(--ok); }
  .dot.error      { background: var(--bad); }
  .cyc { font-variant-numeric: tabular-nums; color: var(--muted); }
  .score-view-picker {
    display: flex; align-items: center; gap: 6px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
  }
  .score-view-picker select {
    appearance: none;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--ink);
    font: inherit;
    font-size: 12px;
    font-weight: 800;
    padding: 4px 20px 4px 9px;
    cursor: pointer;
  }

  .status {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--panel); border: 1px solid var(--line); border-radius: 999px;
    color: var(--muted); font-size: 13px; padding: 8px 18px;
    z-index: 1000; backdrop-filter: blur(8px);
    max-width: 84vw; text-align: center;
  }
  .place-panel {
    position: fixed; top: 14px; right: 14px;
    width: min(310px, calc(100vw - 28px));
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 12px;
    z-index: 1000;
    backdrop-filter: blur(8px);
    box-shadow: 0 0 28px rgba(var(--weather-rgb, 75,163,199), 0.10);
  }
  .place-panel h2 {
    font-size: 14px;
    line-height: 1.2;
    color: var(--ink);
    margin-bottom: 3px;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .place-panel .meta {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    color: var(--muted);
    font-size: 11px;
    font-variant-numeric: tabular-nums;
  }
  .place-panel .weather {
    display: flex; align-items: baseline; gap: 8px;
    margin-top: 7px;
  }
  .place-panel .temp {
    font-size: 26px;
    font-weight: 800;
    line-height: 1;
    color: rgb(var(--weather-rgb, 75,163,199));
  }
  .place-panel .cond {
    font-size: 12px;
    color: var(--ink);
  }
  .place-panel .fact {
    margin-top: 8px;
    min-height: 28px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.35;
  }
  .full-score-panel {
    position: fixed;
    top: 72px;
    right: 14px;
    bottom: 20px;
    width: min(760px, 58vw);
    display: none;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    z-index: 900;
    backdrop-filter: blur(8px);
    box-shadow: 0 0 34px rgba(0,0,0,0.35);
  }
  .full-score-panel iframe {
    width: 100%;
    height: 100%;
    border: 0;
    background: #0b0d11;
  }
  body.score-full #cards { display: none; }
  body.score-full .full-score-panel { display: block; }

  /* score cards over the stage */
  .card {
    position: absolute;
    min-width: 150px; max-width: 240px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 8px 10px;
    z-index: 5;
    transform: translate(-50%, 12px);
    opacity: 0;
    transition: opacity 0.6s, box-shadow 0.4s;
    pointer-events: none;
    backdrop-filter: blur(6px);
  }
  .card.active { opacity: 1; }
  .card.playing { box-shadow: 0 0 22px var(--cardc); }
  .card h3 { font-size: 13px; margin-bottom: 5px; color: var(--cardc); }
  .card .strip {
    position: relative;
    height: 26px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--line);
    border-radius: 5px;
    overflow: hidden;
  }
  .card .blk {
    position: absolute; top: 3px; bottom: 3px;
    border-radius: 3px;
    background: var(--cardc);
    color: #fff; font-size: 9px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; white-space: nowrap;
    min-width: 3px;
  }
  .card .needle {
    position: absolute; top: 0; bottom: 0; width: 2px;
    background: #e03c3c;
  }
  .card .sugg {
    margin-top: 6px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.03em;
  }
  .card .playtag {
    display: none;
    font-size: 10px;
    color: #0c0e12;
    background: var(--cardc);
    border-radius: 999px;
    padding: 1px 8px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .card.spot { transform: translate(-50%, 12px) scale(1.25); z-index: 8; box-shadow: 0 0 34px var(--cardc); }
  .card.spot .playtag { display: inline-block; }
  .card.active:not(.spot) { opacity: 0.75; }
  .leaflet-container { background: #14181d; }
  body.weather-hot { --weather-rgb: 217,142,43; }
  body.weather-cold { --weather-rgb: 105,168,220; }
  body.weather-rain { --weather-rgb: 89,132,190; }
  body.weather-cloud { --weather-rgb: 145,154,164; }
  body.weather-clear { --weather-rgb: 218,190,92; }
  body.weather-night { --weather-rgb: 104,126,210; }
  @media (max-width: 820px) {
    .topbar { left: 14px; right: 14px; transform: none; flex-wrap: wrap; border-radius: 14px; }
    .topbar input[type=text] { width: min(100%, 210px); }
    .place-panel { top: auto; bottom: 64px; right: 14px; }
    .hud { right: 14px; flex-wrap: wrap; border-radius: 14px; }
    .full-score-panel { left: 14px; right: 14px; width: auto; top: 92px; bottom: 20px; }
  }
</style>
</head>
<body>

<div id="map"></div>
<canvas id="stage"></canvas>
<div id="cards"></div>
<div class="full-score-panel" id="fullScorePanel">
  <iframe id="fullScoreFrame" src="index.html" title="Full staff and graphic score"></iframe>
</div>

<div class="hud">
  <span class="dot" id="wsDot"></span>
  <span id="wsLabel">connecting…</span>
  <span class="cyc" id="cycLabel"></span>
  <label class="score-view-picker">score
    <select id="scoreViewSelect">
      <option value="cards">map cards</option>
      <option value="full">full score</option>
    </select>
  </label>
  <button class="btn" id="backBtn" style="display:none;padding:3px 12px;font-size:12px">↩ map</button>
  <span id="paceWrap" style="display:none;align-items:center;gap:6px">
    <input type="range" id="paceRange" min="8" max="160" step="8" value="40" style="width:110px">
    <span class="cyc" id="paceLabel">40c</span>
  </span>
</div>

<div class="topbar" id="topbar">
  <input type="text" id="searchBox" placeholder="search a place… (Enter)">
  <label class="pin-picker">pin <select id="pinSelect"></select></label>
  <button class="btn" id="clearBtn">clear pins</button>
  <button class="btn primary" id="beginBtn" disabled>Begin ▶</button>
</div>

<div class="place-panel" id="placePanel">
  <h2 id="placeName">Lisboa</h2>
  <div class="meta">
    <span id="placeCountry">Portugal</span>
    <span id="placeTime">local time --:--</span>
  </div>
  <div class="weather">
    <span class="temp" id="weatherTemp">--</span>
    <span class="cond" id="weatherCond">loading weather...</span>
  </div>
  <div class="fact" id="placeFact">weather and city data will steer the score surface.</div>
</div>

<div class="status" id="status">search a city, choose a pin, then click the map to place it</div>

<script src="leaflet.js"></script>
<script>
// ═══ City Score — Performer Window 2 (proof of concept) ═════════════════════
// Setup: pick a real place (OSM), assign any d1–d16 pins. Begin: fetch real
// street and pedestrian paths, then grow a surprise weighted network from
// the first placed pin. Performance: pulses spread along existing map paths,
// driven by the Tidal clock; when growth reaches a pin, that line ACTIVATES.

const MAXPINS = 16;
const COLORS = ['#4ba3c7','#a97ffc','#e0699e','#3fae82','#d98e2b','#5c7fe0',
                '#c75b4b','#7fc74b','#4bc7b8','#c74b9e','#94a34b','#4b6ec7',
                '#c7a34b','#8c4bc7','#4bc75e','#c74b4b'];
let GROW_CYCLES = 40;      // cycles for the farthest journey (HUD slider)

// ── shared state ─────────────────────────────────────────────────────────
const pins = [];           // {idx, lat, lon, marker, placedAt}
let routeOverlays = [];    // route polylines shown on the map after ↩
let phase = 'setup';       // 'setup' | 'perf'
const clock = { cycle: 0, cps: 0.5625, at: 0 };
let perf = null;           // set on Begin
const lastEvents = new Map(); // orbit -> [{phase,value,dur,gain,cycle}] of current cycle
const lastPlay = new Map();   // orbit -> performance.now() of last event
let selectedPinIdx = 0;
let placementSeq = 0;

function cycleNow() {
  if (!clock.at) return clock.cycle;
  return clock.cycle + (performance.now() - clock.at) / 1000 * clock.cps;
}

// ── map setup ────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: false }).setView([38.72, -9.14], 14); // Lisboa default
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19, attribution: '© OpenStreetMap'
}).addTo(map);

const statusEl = document.getElementById('status');
const beginBtn = document.getElementById('beginBtn');
const pinSelect = document.getElementById('pinSelect');
const scoreViewSelect = document.getElementById('scoreViewSelect');
const placeNameEl = document.getElementById('placeName');
const placeCountryEl = document.getElementById('placeCountry');
const placeTimeEl = document.getElementById('placeTime');
const weatherTempEl = document.getElementById('weatherTemp');
const weatherCondEl = document.getElementById('weatherCond');
const placeFactEl = document.getElementById('placeFact');

const WEATHER_CODES = new Map([
  [0, 'clear'], [1, 'mainly clear'], [2, 'partly cloudy'], [3, 'cloudy'],
  [45, 'fog'], [48, 'rime fog'], [51, 'light drizzle'], [53, 'drizzle'],
  [55, 'heavy drizzle'], [61, 'light rain'], [63, 'rain'], [65, 'heavy rain'],
  [71, 'light snow'], [73, 'snow'], [75, 'heavy snow'], [80, 'rain showers'],
  [81, 'rain showers'], [82, 'violent showers'], [95, 'thunderstorm'],
  [96, 'thunderstorm hail'], [99, 'thunderstorm hail']
]);

const placeInfo = {
  name: 'Lisboa',
  country: 'Portugal',
  lat: 38.72,
  lon: -9.14,
  timezone: 'Europe/Lisbon',
  weather: null,
  facts: ['Lisboa is the default stage. Search another place to retune the score.'],
  factIndex: 0,
};

function weatherLabel(code) {
  return WEATHER_CODES.get(Number(code)) || 'weather';
}

function weatherMood(w) {
  if (!w) return 'cloud';
  const code = Number(w.weather_code);
  const temp = Number(w.temperature_2m);
  if (w.is_day === 0) return 'night';
  if ([51,53,55,61,63,65,80,81,82,95,96,99].includes(code)) return 'rain';
  if ([45,48,2,3].includes(code)) return 'cloud';
  if (temp >= 27) return 'hot';
  if (temp <= 7) return 'cold';
  return 'clear';
}

function applyWeatherMood() {
  document.body.classList.remove('weather-hot', 'weather-cold', 'weather-rain', 'weather-cloud', 'weather-clear', 'weather-night');
  document.body.classList.add('weather-' + weatherMood(placeInfo.weather));
}

function placeTimeText() {
  try {
    return new Intl.DateTimeFormat([], {
      timeZone: placeInfo.timezone,
      weekday: 'short',
      hour: '2-digit',
      minute: '2-digit',
    }).format(new Date());
  } catch {
    return '--:--';
  }
}

function refreshPlacePanel() {
  placeNameEl.textContent = placeInfo.name || 'Unknown place';
  placeCountryEl.textContent = placeInfo.country || 'unknown country';
  placeTimeEl.textContent = 'local ' + placeTimeText();
  if (placeInfo.weather) {
    const t = Math.round(Number(placeInfo.weather.temperature_2m));
    const wind = Math.round(Number(placeInfo.weather.wind_speed_10m || 0));
    weatherTempEl.textContent = Number.isFinite(t) ? `${t}°C` : '--';
    weatherCondEl.textContent = `${weatherLabel(placeInfo.weather.weather_code)} · ${wind} km/h wind`;
  } else {
    weatherTempEl.textContent = '--';
    weatherCondEl.textContent = 'weather unavailable';
  }
  placeFactEl.textContent = placeInfo.facts[placeInfo.factIndex % placeInfo.facts.length] || '';
}

function buildFacts(extra = {}) {
  if (perf) {
    extra = {
      ways: perf.ways.length,
      life: perf.life.length,
      transit: perf.transit.length,
      routes: perf.paths.length,
      ...extra,
    };
  }
  const facts = [];
  if (placeInfo.weather) {
    const w = placeInfo.weather;
    const temp = Math.round(Number(w.temperature_2m));
    const feels = Math.round(Number(w.apparent_temperature));
    const cloud = Math.round(Number(w.cloud_cover || 0));
    const rain = Number(w.precipitation || 0);
    if (Number.isFinite(temp)) facts.push(`Temperature is ${temp}°C; the stage tint follows this weather.`);
    if (Number.isFinite(feels)) facts.push(`Apparent temperature is ${feels}°C; the score surface breathes with it.`);
    facts.push(`Cloud cover is ${cloud}%; this changes the visual atmosphere.`);
    if (rain > 0) facts.push(`Precipitation is ${rain.toFixed(1)} mm; rain streaks enter the stage.`);
  }
  if (extra.ways !== undefined) facts.push(`${extra.ways} mapped streets and paths are available for neural growth.`);
  if (extra.life !== undefined) facts.push(`${extra.life} nearby places are pulling routes toward lived city space.`);
  if (extra.transit !== undefined) facts.push(`${extra.transit} transit stops/stations are accelerating nearby growth.`);
  if (extra.routes !== undefined) facts.push(`${extra.routes} real route branches connect the active pins.`);
  facts.push(`${pins.length} pins are currently allocated.`);
  facts.push(`Local time in ${placeInfo.name} is ${placeTimeText()}.`);
  placeInfo.facts = facts.length ? facts : ['Search a place to load weather and local city data.'];
}

function rotateFact() {
  placeInfo.factIndex = (placeInfo.factIndex + 1) % Math.max(1, placeInfo.facts.length);
  refreshPlacePanel();
}

function parsePlaceName(result) {
  const a = result.address || {};
  return a.city || a.town || a.village || a.municipality || a.county || result.display_name.split(',')[0] || 'Unknown place';
}

async function loadWeather(lat, lon) {
  const url = 'https://api.open-meteo.com/v1/forecast'
    + `?latitude=${encodeURIComponent(lat)}&longitude=${encodeURIComponent(lon)}`
    + '&current=temperature_2m,apparent_temperature,is_day,precipitation,rain,weather_code,cloud_cover,wind_speed_10m'
    + '&timezone=auto';
  const r = await fetch(url);
  if (!r.ok) throw new Error('weather ' + r.status);
  const js = await r.json();
  placeInfo.timezone = js.timezone || placeInfo.timezone;
  placeInfo.weather = js.current || null;
  applyWeatherMood();
  buildFacts();
  refreshPlacePanel();
}

async function setPlaceFromSearch(result) {
  const lat = +result.lat, lon = +result.lon;
  placeInfo.name = parsePlaceName(result);
  placeInfo.country = result.address?.country || result.display_name.split(',').slice(-1)[0]?.trim() || '';
  placeInfo.lat = lat;
  placeInfo.lon = lon;
  placeInfo.weather = null;
  placeInfo.factIndex = 0;
  buildFacts();
  refreshPlacePanel();
  try {
    await loadWeather(lat, lon);
  } catch {
    weatherCondEl.textContent = 'weather unavailable';
    buildFacts();
    refreshPlacePanel();
  }
}

setInterval(refreshPlacePanel, 1000);
setInterval(rotateFact, 9000);
loadWeather(placeInfo.lat, placeInfo.lon).catch(() => refreshPlacePanel());

function updateScoreView() {
  document.body.classList.toggle('score-full', scoreViewSelect.value === 'full');
}
scoreViewSelect.addEventListener('change', updateScoreView);
updateScoreView();

for (let i = 0; i < MAXPINS; i++) {
  const opt = document.createElement('option');
  opt.value = i;
  opt.textContent = `d${i + 1}`;
  pinSelect.appendChild(opt);
}
pinSelect.addEventListener('change', e => {
  selectedPinIdx = Number(e.target.value);
  const existing = pinByIdx(selectedPinIdx);
  statusEl.textContent = existing
    ? `d${selectedPinIdx + 1} selected — click the map to move it`
    : `d${selectedPinIdx + 1} selected — click the map to place it`;
});

function placedPins() {
  return [...pins].sort((a, b) => a.idx - b.idx);
}

function pinByIdx(idx) {
  return pins.find(p => p.idx === idx);
}

function originPin() {
  return [...pins].sort((a, b) => a.placedAt - b.placedAt)[0];
}

function updateBeginState() {
  beginBtn.disabled = pins.length < 2;
}

document.getElementById('searchBox').addEventListener('keydown', async e => {
  if (e.key !== 'Enter') return;
  const q = e.target.value.trim();
  if (!q) return;
  statusEl.textContent = 'searching…';
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=1&q=${encodeURIComponent(q)}`);
    const js = await r.json();
    if (js[0]) {
      map.setView([+js[0].lat, +js[0].lon], 15);
      await setPlaceFromSearch(js[0]);
      statusEl.textContent = `${placeInfo.name} — choose a pin, then click the map`;
    } else statusEl.textContent = 'place not found';
  } catch { statusEl.textContent = 'search failed (offline?)'; }
});

map.on('click', e => {
  if (phase !== 'setup') return;
  placeOrMovePin(selectedPinIdx, e.latlng);
});

function placeOrMovePin(idx, latlng) {
  let pin = pinByIdx(idx);
  if (pin) {
    pin.lat = latlng.lat;
    pin.lon = latlng.lng;
    pin.marker.setLatLng(latlng);
    statusEl.textContent = `d${idx + 1} moved — ${pins.length >= 2 ? 'Begin when ready' : 'place one more pin'}`;
  } else {
    const marker = L.circleMarker(latlng, {
      radius: 10, color: COLORS[idx], fillColor: COLORS[idx], fillOpacity: 0.85, weight: 2
    }).addTo(map).bindTooltip(`d${idx + 1}`, { permanent: true, direction: 'top', offset: [0, -10] });
    marker.on('click', ev => { L.DomEvent.stopPropagation(ev); removePin(idx); });
    pins.push({ idx, lat: latlng.lat, lon: latlng.lng, marker, placedAt: placementSeq++ });
    statusEl.textContent = `d${idx + 1} placed — ${pins.length >= 2 ? 'Begin when ready' : 'place one more pin'}`;
  }
  updateBeginState();
}

function removePin(idx) {
  if (phase !== 'setup') return;
  const i = pins.findIndex(p => p.idx === idx);
  if (i === -1) return;
  map.removeLayer(pins[i].marker);
  pins.splice(i, 1);
  updateBeginState();
  statusEl.textContent = `d${idx + 1} removed — choose a pin, then click the map`;
}

document.getElementById('clearBtn').addEventListener('click', () => {
  while (pins.length) removePin(pins[0].idx);
  placementSeq = 0;
  statusEl.textContent = 'pins cleared — choose a pin, then click the map';
});

// ── street graph (Overpass) ──────────────────────────────────────────────
async function fetchCity(bounds) {
  const bbox = `${bounds.getSouth()},${bounds.getWest()},${bounds.getNorth()},${bounds.getEast()}`;
  // Streets get their own output budget — a shared cap let dense venue
  // areas starve the ways entirely (nodes print first in Overpass output).
  const q = `[out:json][timeout:60];
way[highway~"^(footway|path|steps|pedestrian|living_street|residential|service|track|cycleway|unclassified|tertiary|secondary|primary|trunk)$"](${bbox});
out geom 6000;
(
node[amenity~"^(bar|cafe|restaurant|pub|nightclub|theatre|cinema|marketplace|music_venue)$"](${bbox});
node[shop](${bbox});
node[railway~"^(station|halt|tram_stop)$"](${bbox});
node[highway=bus_stop](${bbox});
);
out 3500;`;
  const r = await fetch('https://overpass-api.de/api/interpreter', {
    method: 'POST', body: 'data=' + encodeURIComponent(q)
  });
  if (!r.ok) throw new Error('overpass ' + r.status);
  const js = await r.json();
  const ways = [], life = [], transit = [];
  for (const e of js.elements) {
    if (e.type === 'way' && e.geometry) ways.push(e);
    else if (e.type === 'node') {
      const t = e.tags || {};
      if (t.railway || t.highway === 'bus_stop')
        transit.push({ lat: e.lat, lon: e.lon, rail: !!t.railway });
      else life.push({ lat: e.lat, lon: e.lon });
    }
  }
  // caps to keep rendering light
  const cap = (arr, n) => arr.length <= n ? arr : arr.filter((_, i) => i % Math.ceil(arr.length / n) === 0);
  return { ways, life: cap(life, 2500), transit: cap(transit, 400) };
}

// "street life" density grid (~120m bins) — weights routing and glows
function buildDensity(life) {
  const bins = new Map();
  const key = (la, lo) => `${Math.round(la / 0.0011)},${Math.round(lo / 0.0014)}`;
  for (const p of life) bins.set(key(p.lat, p.lon), (bins.get(key(p.lat, p.lon)) || 0) + 1);
  return { at: (la, lo) => bins.get(key(la, lo)) || 0 };
}

function nearTransit(transit, lat, lon, radiusDeg = 0.0009) {
  for (const t of transit) {
    const dx = (t.lon - lon) * 0.75, dy = t.lat - lat;
    if (dx * dx + dy * dy < radiusDeg * radiusDeg) return true;
  }
  return false;
}

function streetFactor(tags = {}) {
  const h = tags.highway || '';
  let f = 1;
  if (/^(footway|path|steps|pedestrian)$/.test(h)) f = 0.58;
  else if (h === 'living_street') f = 0.72;
  else if (/^(residential|service|track|cycleway)$/.test(h)) f = 0.88;
  else if (/^(secondary|primary|trunk)$/.test(h)) f = 1.32;
  if (tags.foot === 'yes' || tags.sidewalk === 'both' || tags.sidewalk === 'left' || tags.sidewalk === 'right') f *= 0.9;
  if (tags.foot === 'no' || tags.access === 'private') f *= 3.5;
  return f;
}

function buildGraph(ways, density) {
  const nodes = new Map(); // key -> {lat,lon,adj:[{key,w}]}
  const key = (la, lo) => la.toFixed(5) + ',' + lo.toFixed(5);
  const dist = (a, b) => {
    const dx = (a.lon - b.lon) * Math.cos((a.lat + b.lat) / 2 * Math.PI / 180);
    const dy = a.lat - b.lat;
    return Math.sqrt(dx * dx + dy * dy);
  };
  const getNode = pt => {
    const k = key(pt.lat, pt.lon);
    if (!nodes.has(k)) nodes.set(k, { lat: pt.lat, lon: pt.lon, adj: [] });
    return k;
  };
  for (const w of ways) {
    for (let i = 1; i < w.geometry.length; i++) {
      const a = getNode(w.geometry[i - 1]), b = getNode(w.geometry[i]);
      const na = nodes.get(a), nb = nodes.get(b);
      let wgt = dist(na, nb) * streetFactor(w.tags);
      if (density) {
        // Neural growth prefers lively streets, but keeps a little surprise.
        const d = density.at((na.lat + nb.lat) / 2, (na.lon + nb.lon) / 2);
        wgt *= 1.35 - Math.min(0.75, d * 0.1);
      }
      const drift = 0.72 + Math.random() * 0.72;
      na.adj.push({ key: b, w: wgt * drift });
      nb.adj.push({ key: a, w: wgt * (0.72 + Math.random() * 0.72) });
    }
  }
  return nodes;
}

function nearestNode(nodes, lat, lon) {
  let best = null, bd = Infinity;
  for (const [k, n] of nodes) {
    const dx = (n.lon - lon) * Math.cos(lat * Math.PI / 180);
    const dy = n.lat - lat;
    const d = dx * dx + dy * dy;
    if (d < bd) { bd = d; best = k; }
  }
  return best;
}

// Single-source weighted growth from the origin over the whole street graph.
// It is Dijkstra-like, but the edge costs are artistic: pedestrian paths and
// lively streets are easier to grow through, with surprise added per Begin.
function dijkstraAll(nodes, fromKey) {
  const dist = new Map([[fromKey, 0]]);
  const prev = new Map();
  const visited = new Set();
  // binary min-heap (the sort-based queue melted on city-sized graphs)
  const heap = [[0, fromKey]];
  const up = i => { while (i > 0) { const p = (i - 1) >> 1; if (heap[p][0] <= heap[i][0]) break; [heap[p], heap[i]] = [heap[i], heap[p]]; i = p; } };
  const down = () => { let i = 0; for (;;) { let m = i; const l = 2*i+1, r = 2*i+2;
    if (l < heap.length && heap[l][0] < heap[m][0]) m = l;
    if (r < heap.length && heap[r][0] < heap[m][0]) m = r;
    if (m === i) break; [heap[m], heap[i]] = [heap[i], heap[m]]; i = m; } };
  const push = x => { heap.push(x); up(heap.length - 1); };
  const pop = () => { const t = heap[0], b = heap.pop(); if (heap.length) { heap[0] = b; down(); } return t; };

  while (heap.length) {
    const [d, k] = pop();
    if (visited.has(k)) continue;
    visited.add(k);
    for (const { key: nk, w } of (nodes.get(k)?.adj || [])) {
      const nd = d + w;
      if (nd < (dist.get(nk) ?? Infinity)) {
        dist.set(nk, nd);
        prev.set(nk, k);
        push([nd, nk]);
      }
    }
  }
  return { dist, prev };
}

// Path from origin to the reachable street node closest to (lat, lon).
// The path itself stays on existing OSM geometry; pins are effectively
// snapped to the nearest reachable street/path node for routing.
function routeToward(nodes, reach, fromKey, lat, lon) {
  let best = null, bd = Infinity;
  for (const k of reach.dist.keys()) {
    const n = nodes.get(k);
    const dx = (n.lon - lon) * 0.75, dy = n.lat - lat;
    const d = dx * dx + dy * dy;
    if (d < bd) { bd = d; best = k; }
  }
  if (!best) return null;
  const path = [best];
  while (path[0] !== fromKey) {
    const pk = reach.prev.get(path[0]);
    if (!pk) return null;
    path.unshift(pk);
  }
  return path.map(k => nodes.get(k));
}

// ── the city CONDUCTS (never composes): real data near a pin becomes an
// attention weight. Music always comes from Pulsar; the weight only decides
// how often/long this pin gets the performer's spotlight.
function pinWeight(pin, life, transit) {
  const R = 0.003; // ≈ 300 m
  const near = (p) => {
    const dx = (p.lon - pin.lon) * 0.75, dy = p.lat - pin.lat;
    return dx * dx + dy * dy < R * R;
  };
  const stops = transit.filter(near).length;
  const lifeN = life.filter(near).length;
  return { weight: 1 + stops + lifeN / 10, stops, lifeN };
}

// ── Begin: build the performance ─────────────────────────────────────────
document.getElementById('beginBtn').addEventListener('click', async () => {
  routeOverlays.forEach(l => map.removeLayer(l));
  routeOverlays = [];
  const activePins = placedPins();
  const origin = originPin(); // the system chooses: first-placed pin
  statusEl.textContent = 'fetching real streets and pedestrian paths…';
  beginBtn.disabled = true;
  const bounds = map.getBounds();

  let ways = [], life = [], transit = [], nodes = null, density = null;
  try {
    ({ ways, life, transit } = await fetchCity(bounds));
    density = buildDensity(life);
    nodes = buildGraph(ways, density);
    statusEl.textContent = `${ways.length} paths/streets · ${life.length} places · ${transit.length} transit stops · growing…`;
  } catch (e) {
    statusEl.textContent = 'street/path data unavailable — cannot grow real routes here';
    beginBtn.disabled = pins.length < 2;
    return;
  }

  let reach = null, originKey = null;
  if (nodes) {
    originKey = nearestNode(nodes, origin.lat, origin.lon);
    if (originKey) reach = dijkstraAll(nodes, originKey);
  }
  if (!reach) {
    statusEl.textContent = 'no reachable street/path network found near the origin pin';
    beginBtn.disabled = pins.length < 2;
    return;
  }

  let routed = 0;
  let skipped = 0;
  const paths = [];
  for (const p of activePins) {
    if (p === origin) continue;
    let pts = null;
    if (reach) {
      const path = routeToward(nodes, reach, originKey, p.lat, p.lon);
      if (path && path.length > 1) { pts = path; routed++; }
    }
    if (!pts) { skipped++; continue; }
    // cumulative lengths for smooth pulse travel
    const cum = [0];
    for (let i = 1; i < pts.length; i++) {
      const dx = (pts[i].lon - pts[i-1].lon) * Math.cos(pts[i].lat * Math.PI / 180);
      const dy = pts[i].lat - pts[i-1].lat;
      cum.push(cum[i-1] + Math.sqrt(dx*dx + dy*dy));
    }
    // transit proximity per point: growth accelerates where the city
    // moves people (real stations/stops from OSM)
    const boost = pts.map(pt => nearTransit(transit, pt.lat, pt.lon) ? 1 : 0);
    paths.push({ pin: p, pts, cum, boost, total: cum[cum.length-1] || 1e-9, arrived: false, progress: 0 });
  }

  if (!paths.length) {
    statusEl.textContent = 'no real street/path routes reached the selected pins — move pins closer to mapped paths';
    beginBtn.disabled = pins.length < 2;
    return;
  }

  const weights = new Map();
  for (const p of activePins) weights.set(p.idx, pinWeight(p, life, transit));

  perf = {
    origin, paths, ways, life, transit, density, weights,
    spot: { idx: null, until: -1 },
    bounds,
    startCycle: Math.floor(cycleNow()),
    maxLen: Math.max(...paths.map(p => p.total)),
    lastFrame: performance.now(),
    lastCycle: cycleNow(),
  };
  buildFacts({ ways: ways.length, life: life.length, transit: transit.length, routes: paths.length });
  refreshPlacePanel();

  buildCards();
  phase = 'perf';
  document.getElementById('map').style.display = 'none';
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('backBtn').style.display = '';
  document.getElementById('paceWrap').style.display = 'flex';
  const stage = document.getElementById('stage');
  stage.style.display = 'block';
  resizeStage();
  statusEl.textContent = `origin: d${origin.idx + 1} · ${routed}/${activePins.length - 1} real routes${skipped ? ` · ${skipped} unreachable` : ''} — neural growth follows the city`;
});

// ── performance stage ────────────────────────────────────────────────────
const stage = document.getElementById('stage');
const ctx = stage.getContext('2d');
let SW = 0, SH = 0;
function resizeStage() {
  const DPR = window.devicePixelRatio || 1;
  SW = window.innerWidth; SH = window.innerHeight;
  stage.width = SW * DPR; stage.height = SH * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  positionCards();
}
window.addEventListener('resize', resizeStage);

function project(lat, lon) {
  const b = perf.bounds;
  const pad = 70;
  const x = pad + (lon - b.getWest()) / (b.getEast() - b.getWest()) * (SW - pad * 2);
  const y = pad + (b.getNorth() - lat) / (b.getNorth() - b.getSouth()) * (SH - pad * 2);
  return [x, y];
}

// Music energy: every played event feeds the organism; it decays fast, so
// the growth visibly breathes with the set (silence = near-stall).
let energy = 0;

function frontIndex(path) {
  let i = 1;
  while (i < path.cum.length && path.cum[i] < path.progress) i++;
  return Math.min(i, path.pts.length - 1);
}

function advanceGrowth() {
  const nowC = cycleNow();
  const dCyc = Math.max(0, Math.min(0.25, nowC - perf.lastCycle));
  perf.lastCycle = nowC;
  energy *= Math.exp(-dCyc * 1.6);

  const base = perf.maxLen / GROW_CYCLES; // map-units per cycle
  for (const path of perf.paths) {
    if (path.arrived) continue;
    const i = frontIndex(path);
    const transitMult = path.boost[i] || path.boost[Math.max(0, i - 1)] ? 1.5 : 1;
    const musicMult = 0.3 + Math.min(1.3, energy * 0.6);
    path.progress = Math.min(path.total, path.progress + base * dCyc * musicMult * transitMult);
  }
}

function weatherRgb() {
  const mood = weatherMood(placeInfo.weather);
  if (mood === 'hot') return [217, 142, 43];
  if (mood === 'cold') return [105, 168, 220];
  if (mood === 'rain') return [89, 132, 190];
  if (mood === 'cloud') return [145, 154, 164];
  if (mood === 'night') return [104, 126, 210];
  return [218, 190, 92];
}

function drawWeatherAtmosphere() {
  const w = placeInfo.weather;
  if (!w) return;
  const [r, g, b] = weatherRgb();
  const mood = weatherMood(w);
  const cloud = Math.max(0, Math.min(100, Number(w.cloud_cover) || 0));
  const temp = Number(w.temperature_2m);
  const rain = Number(w.precipitation || 0) + Number(w.rain || 0);
  const t = performance.now();

  const baseAlpha = Math.min(0.18, 0.055 + cloud / 1100 + (mood === 'rain' ? 0.025 : 0));
  ctx.fillStyle = `rgba(${r},${g},${b},${baseAlpha})`;
  ctx.fillRect(0, 0, SW, SH);

  const wash = ctx.createRadialGradient(SW * 0.72, SH * 0.22, 20, SW * 0.72, SH * 0.22, Math.max(SW, SH) * 0.85);
  wash.addColorStop(0, `rgba(${r},${g},${b},${0.12 + cloud / 1300})`);
  wash.addColorStop(0.55, `rgba(${r},${g},${b},0.045)`);
  wash.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = wash;
  ctx.fillRect(0, 0, SW, SH);

  const vignette = ctx.createRadialGradient(SW * 0.5, SH * 0.48, Math.min(SW, SH) * 0.20, SW * 0.5, SH * 0.5, Math.max(SW, SH) * 0.72);
  vignette.addColorStop(0, 'rgba(0,0,0,0)');
  vignette.addColorStop(1, `rgba(${r},${g},${b},0.075)`);
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, SW, SH);

  const tempNorm = Number.isFinite(temp) ? Math.max(-1, Math.min(1, (temp - 17) / 18)) : 0;
  if (Number.isFinite(temp)) {
    const heat = Math.max(0, Math.min(1, (temp - 24) / 16));
    const cold = Math.max(0, Math.min(1, (8 - temp) / 16));
    if (heat || cold) {
      const grad = ctx.createLinearGradient(0, heat ? 0 : SH, 0, heat ? SH * 0.55 : SH * 0.45);
      grad.addColorStop(0, heat ? `rgba(217,142,43,${0.13 + heat * 0.08})` : `rgba(105,168,220,${0.13 + cold * 0.08})`);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, SW, SH);
    }
  }

  if (cloud > 20 || mood === 'cloud') {
    const wind = Math.max(0, Number(w.wind_speed_10m) || 0);
    const cloudCount = Math.max(2, Math.min(7, Math.round(cloud / 20)));
    const driftSpeed = 15 + wind * 5;
    const cloudAlpha = Math.min(0.16, 0.035 + cloud / 900);
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    for (let i = 0; i < cloudCount; i++) {
      const baseW = 58 + (i % 4) * 18 + cloud * 0.22;
      const baseH = 14 + (i % 3) * 6 + cloud * 0.055;
      const x = ((i * 173 + t / driftSpeed) % (SW + baseW * 2)) - baseW;
      const y = 70 + ((i * 91) % Math.max(120, SH - 130));
      const pulse = Math.sin(t / 3200 + i) * 0.025;
      ctx.fillStyle = `rgba(225,230,232,${cloudAlpha + pulse})`;
      ctx.beginPath();
      ctx.ellipse(x, y, baseW * 0.38, baseH * 0.72, 0, 0, Math.PI * 2);
      ctx.ellipse(x + baseW * 0.22, y - baseH * 0.24, baseW * 0.30, baseH * 0.95, 0, 0, Math.PI * 2);
      ctx.ellipse(x + baseW * 0.48, y, baseW * 0.42, baseH * 0.68, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = `rgba(${r},${g},${b},${0.015 + cloud / 5200})`;
      ctx.fillRect(x - baseW * 0.32, y + baseH * 0.2, baseW * 1.2, baseH * 0.42);
    }
    ctx.restore();
  }

  if (rain > 0 || mood === 'rain') {
    const count = Math.min(150, 60 + rain * 35);
    ctx.strokeStyle = `rgba(170,215,245,${Math.min(0.42, 0.18 + rain * 0.055)})`;
    ctx.lineWidth = 0.9;
    ctx.lineCap = 'round';
    for (let i = 0; i < count; i++) {
      const x = (i * 97 + t / 23) % (SW + 80) - 40;
      const y = (i * 53 + t / 8.5) % (SH + 100) - 50;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x - 6, y + 24);
      ctx.stroke();
    }
    ctx.lineCap = 'butt';
  }

  if (mood === 'night') {
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.fillRect(0, 0, SW, SH);
    ctx.strokeStyle = `rgba(${r},${g},${b},0.13)`;
    ctx.lineWidth = 0.8;
    for (let i = 0; i < 5; i++) {
      const x = ((i * 211 + t / 260) % (SW + 100)) - 50;
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x + 80, SH);
      ctx.stroke();
    }
  }
}

function draw() {
  requestAnimationFrame(draw);
  if (phase !== 'perf' || !perf) return;
  ctx.clearRect(0, 0, SW, SH);
  document.getElementById('cycLabel').textContent =
    clock.at ? `cycle ${Math.floor(cycleNow())}` : '';

  advanceGrowth();
  drawWeatherAtmosphere();

  // street web (context, faint)
  ctx.strokeStyle = 'rgba(130,150,170,0.26)';
  ctx.lineWidth = 1;
  for (const w of perf.ways) {
    ctx.beginPath();
    w.geometry.forEach((g, i) => {
      const [x, y] = project(g.lat, g.lon);
      i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
    });
    ctx.stroke();
  }

  // street life: warm dots, breathing gently with the music energy
  const lifeGlow = 0.10 + Math.min(0.14, energy * 0.05);
  ctx.fillStyle = `rgba(217,142,43,${lifeGlow})`;
  for (const p of perf.life) {
    const [x, y] = project(p.lat, p.lon);
    ctx.fillRect(x - 1.2, y - 1.2, 2.4, 2.4);
  }

  // transit stops: cool diamonds (rail brighter than bus) + service ripples
  const nowCyc = cycleNow();
  for (const t of perf.transit) {
    const [x, y] = project(t.lat, t.lon);
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(Math.PI / 4);
    ctx.fillStyle = t.rail ? 'rgba(150,200,255,0.5)' : 'rgba(150,200,255,0.18)';
    const s = t.rail ? 4 : 2.4;
    ctx.fillRect(-s / 2, -s / 2, s, s);
    ctx.restore();

    // heartbeat ripple: rail every 4 cycles, bus every 8, offset by position
    const period = t.rail ? 4 : 8;
    const off = ((t.lat * 7919 + t.lon * 104729) % period + period) % period;
    const ph = ((nowCyc + off) % period) / period;
    if (ph < 0.5) {
      const rr = 4 + ph * 44;
      ctx.beginPath();
      ctx.arc(x, y, rr, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(150,200,255,${(t.rail ? 0.22 : 0.10) * (1 - ph * 2)})`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }

  const nowPh = cycleNow() - Math.floor(cycleNow());
  updateSpotlight();

  for (const path of perf.paths) {
    const col = COLORS[path.pin.idx];
    const reach = Math.min(path.progress, path.total);
    if (!path.arrived && reach >= path.total) { path.arrived = true; activate(path.pin); }

    // lit portion of the street path
    ctx.strokeStyle = col;
    ctx.lineWidth = 2.4;
    ctx.shadowColor = col; ctx.shadowBlur = 8;
    ctx.beginPath();
    let started = false;
    for (let i = 0; i < path.pts.length; i++) {
      if (path.cum[i] > reach) {
        // partial segment up to the front
        const j = i - 1;
        const f = (reach - path.cum[j]) / (path.cum[i] - path.cum[j]);
        const la = path.pts[j].lat + (path.pts[i].lat - path.pts[j].lat) * f;
        const lo = path.pts[j].lon + (path.pts[i].lon - path.pts[j].lon) * f;
        const [x, y] = project(la, lo);
        ctx.lineTo(x, y);
        // growth front pulse
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(x, y, 4 + Math.sin(performance.now() / 120) * 1.5, 0, Math.PI * 2);
        ctx.fillStyle = col;
        ctx.fill();
        started = false;
        break;
      }
      const [x, y] = project(path.pts[i].lat, path.pts[i].lon);
      if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
    }
    if (started) ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // pins
  for (const p of pins) {
    const [x, y] = project(p.lat, p.lon);
    const col = COLORS[p.idx];
    const isOrigin = p === perf.origin;
    const arrived = isOrigin || perf.paths.find(pa => pa.pin === p)?.arrived;
    const playedAgo = performance.now() - (lastPlay.get(p.idx) || 0);
    const flash = Math.max(0, 1 - playedAgo / 400);

    const spotted = perf.spot.idx === p.idx;
    if (spotted) {
      // breathing conductor halo
      const breathe = 6 + Math.sin(performance.now() / 260) * 3;
      ctx.beginPath();
      ctx.arc(x, y, 20 + breathe, 0, Math.PI * 2);
      ctx.strokeStyle = col + 'aa';
      ctx.lineWidth = 2.5;
      ctx.shadowColor = col;
      ctx.shadowBlur = 26;
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
    ctx.beginPath();
    ctx.arc(x, y, (arrived ? 9 : 5) + flash * 6 + (spotted ? 3 : 0), 0, Math.PI * 2);
    ctx.fillStyle = arrived ? col : col + '55';
    ctx.shadowColor = col;
    ctx.shadowBlur = arrived ? 14 + flash * 20 : 0;
    ctx.fill();
    ctx.shadowBlur = 0;

    ctx.fillStyle = arrived ? '#fff' : 'rgba(255,255,255,0.4)';
    ctx.font = '700 12px Inter, sans-serif';
    ctx.fillText(`d${p.idx + 1}`, x + 12, y + 4);
  }

  updateCards(nowPh);
}
requestAnimationFrame(draw);

// ── score cards ──────────────────────────────────────────────────────────
const cardsEl = document.getElementById('cards');
const cardMap = new Map(); // pinIdx -> {el, strip, needle}

function buildCards() {
  cardsEl.innerHTML = '';
  cardMap.clear();
  for (const p of placedPins()) {
    const el = document.createElement('div');
    el.className = 'card';
    el.style.setProperty('--cardc', COLORS[p.idx]);
    const w = perf && perf.weights ? perf.weights.get(p.idx) : null;
    el.innerHTML = `<h3>d${p.idx + 1} <span class="playtag">▶ PLAY</span></h3>` +
      `<div class="strip"><div class="needle" style="left:0"></div></div>` +
      (w ? `<div class="sugg">🏙 ${w.stops} stops · ${w.lifeN} places</div>` : '');
    cardsEl.appendChild(el);
    cardMap.set(p.idx, { el, strip: el.querySelector('.strip'), needle: el.querySelector('.needle'), pin: p });
  }
  positionCards();
  // origin is active from the start
  activate(perf.origin);
}

function positionCards() {
  if (!perf) return;
  for (const { el, pin } of cardMap.values()) {
    const [x, y] = project(pin.lat, pin.lon);
    el.style.left = x + 'px';
    el.style.top = y + 'px';
  }
}

function activate(pin) {
  const c = cardMap.get(pin.idx);
  if (c) c.el.classList.add('active');
}

// The conductor: among activated pins, one holds the spotlight for a few
// cycles (3–10, scaled by its real-data weight), then a weighted-random
// other pin takes it. The performer plays the spotlighted line.
function updateSpotlight() {
  if (!perf) return;
  const nowC = cycleNow();
  const active = placedPins().filter(p =>
    p === perf.origin || perf.paths.find(pa => pa.pin === p)?.arrived);
  if (active.length < 2) { perf.spot.idx = active[0]?.idx ?? null; return; }
  if (perf.spot.idx !== null && nowC < perf.spot.until) return;

  const candidates = active.filter(p => p.idx !== perf.spot.idx);
  const totalW = candidates.reduce((s, p) => s + (perf.weights.get(p.idx)?.weight || 1), 0);
  let r = Math.random() * totalW;
  let next = candidates[0];
  for (const p of candidates) {
    r -= perf.weights.get(p.idx)?.weight || 1;
    if (r <= 0) { next = p; break; }
  }
  const w = perf.weights.get(next.idx)?.weight || 1;
  const maxW = Math.max(...active.map(p => perf.weights.get(p.idx)?.weight || 1));
  perf.spot.idx = next.idx;
  perf.spot.until = nowC + 3 + 7 * (w / maxW); // 3–10 cycles by weight share
}

function updateCards(nowPh) {
  for (const [orbit, c] of cardMap) {
    if (!c.el.classList.contains('active')) continue;
    c.needle.style.left = (nowPh * 100).toFixed(1) + '%';
    const playedAgo = performance.now() - (lastPlay.get(orbit) || 1e12);
    c.el.classList.toggle('playing', playedAgo < 350);
    c.el.classList.toggle('spot', perf && perf.spot.idx === orbit);
  }
}

// rebuild a card's strip from its current-cycle events
function refreshStrip(orbit) {
  const c = cardMap.get(orbit);
  if (!c) return;
  const evs = lastEvents.get(orbit) || [];
  const needle = c.needle;
  c.strip.innerHTML = '';
  c.strip.appendChild(needle);
  for (const e of evs) {
    const b = document.createElement('div');
    b.className = 'blk';
    b.style.left = (e.phase * 100).toFixed(1) + '%';
    b.style.width = Math.max(2.5, e.dur * 100).toFixed(1) + '%';
    b.style.opacity = 0.5 + Math.min(0.5, e.gain * 0.35);
    const wPct = Math.max(2.5, e.dur * 100);
    if (wPct > 11) b.textContent = e.value;
    b.title = e.value;
    c.strip.appendChild(b);
  }
}

// ── events from the bridge ───────────────────────────────────────────────
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const noteName = m => { const r = Math.round(m); return NOTE_NAMES[((r%12)+12)%12] + Math.floor(r/12); };

function addEvent(ev) {
  const orbit = ev.orbit ?? 0;
  const cyc = Number(ev.cycle);
  if (!Number.isFinite(cyc) || orbit < 0 || orbit >= MAXPINS) return;
  const ci = Math.floor(cyc);
  const cps = Number(ev.cps) || clock.cps;
  let list = lastEvents.get(orbit);
  if (!list || list.length === 0 || list[0].cycle !== ci) { list = []; lastEvents.set(orbit, list); }
  list.push({
    cycle: ci,
    phase: cyc - ci,
    value: ev.s ?? (ev.note !== undefined && ev.note !== '' ? noteName(Number(ev.note) + 60)
          : ev.n !== undefined && ev.n !== '' ? noteName(Number(ev.n) + 60) : '·'),
    dur: Math.max(0.02, (Number(ev.delta) || 0.1) * cps),
    gain: Number(ev.gain) || 1,
  });
  lastPlay.set(orbit, performance.now());
  if (phase === 'perf') {
    energy = Math.min(3.2, energy + 0.22 * (Number(ev.gain) || 1));
    refreshStrip(orbit);
  }
}

// ── back to the map (re-plan pins; performance state resets) ────────────
document.getElementById('paceRange').addEventListener('input', e => {
  GROW_CYCLES = parseInt(e.target.value);
  document.getElementById('paceLabel').textContent = GROW_CYCLES + 'c';
});

document.getElementById('backBtn').addEventListener('click', () => {
  // draw the computed routes on the REAL map so the streets are verifiable
  routeOverlays.forEach(l => map.removeLayer(l));
  routeOverlays = [];
  if (perf) {
    for (const path of perf.paths) {
      routeOverlays.push(L.polyline(path.pts.map(p => [p.lat, p.lon]), {
        color: COLORS[path.pin.idx], weight: 4, opacity: 0.8
      }).addTo(map));
    }
  }
  phase = 'setup';
  perf = null;
  energy = 0;
  document.getElementById('cards').innerHTML = '';
  document.getElementById('stage').style.display = 'none';
  document.getElementById('map').style.display = '';
  document.getElementById('topbar').style.display = '';
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('paceWrap').style.display = 'none';
  updateBeginState();
  statusEl.textContent = 'back on the map — move pins or Begin again';
  map.invalidateSize();
});

// ── bridge ───────────────────────────────────────────────────────────────
const wsDot = document.getElementById('wsDot');
const wsLabel = document.getElementById('wsLabel');
function connect() {
  wsDot.className = 'dot connecting';
  wsLabel.textContent = 'connecting…';
  const url = `ws://${location.hostname || '127.0.0.1'}:${location.port || 8766}`;
  const ws = new WebSocket(url);
  ws.onopen = () => { wsDot.className = 'dot connected'; wsLabel.textContent = 'live'; };
  ws.onclose = () => {
    wsDot.className = 'dot connecting';
    wsLabel.textContent = 'reconnecting…';
    setTimeout(connect, 2000);
  };
  ws.onerror = () => { wsDot.className = 'dot error'; wsLabel.textContent = 'bridge?'; };
  ws.onmessage = m => {
    try {
      const msg = JSON.parse(m.data);
      if (msg.type === 'clock' && Number.isFinite(Number(msg.cycle)) && Number(msg.cps) > 0) {
        clock.cycle = Number(msg.cycle);
        clock.cps = Number(msg.cps);
        clock.at = performance.now();
      }
      if (msg.type === 'tidal-event') addEvent(msg);
    } catch {}
  };
}
connect();
</script>
